<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch trình nè</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="screen-3" class="screen active">
        <button id="btn-back-3" class="btn-back" onclick="window.history.back()"><i class="fa-solid fa-arrow-left"></i> Chỉnh lại tí</button>
        <div class="card timeline-card mt-2">
            <h2>Lịch Trình Hẹn Hò 💖</h2>
            <p class="subtitle">Thứ 5 này sẽ là một ngày thật vui!</p>
            
            <div class="timeline" id="dynamic-timeline-container">
                <!-- Sẽ được điền tự động bằng Javascript dựa trên lựa chọn -->
            </div>
            
            <button id="btn-submit" class="btn btn-primary w-100 mt-4">Chốt lịch nhé! ✨</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
